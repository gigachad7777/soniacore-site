<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Про Soniacore</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    line-height: 1.6; /* Покращує читабельність тексту */
}

header {
    background: #171a21;
    padding: 15px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header img {
    width: 50px;
    margin-bottom: 10px;
}

.logo {
    font-size: 24px;
    color: #66c0f4;
    font-weight: bold;
    margin-bottom: 10px;
}

nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

nav a {
    color: #c7d5e0;
    text-decoration: none;
    font-size: 16px;
}

nav a:hover {
    color: white;
}

.content {
    padding: 40px 20px;
    max-width: 800px;
    margin: 0 auto; /* Центрування блоку з текстом */
}

h1 {
    font-size: 28px;
    color: #66c0f4;
}

p {
    font-size: 18px;
    margin-bottom: 20px;
}

/* Стиль для списку команди */
.team-list {
    background: #1b2838;
    padding: 15px;
    border-radius: 10px;
    display: inline-block;
    margin-top: 10px;
}

/* Налаштування для комп'ютерів */
@media (min-width: 768px) {
    header {
        flex-direction: row;
        justify-content: flex-start;
        padding: 10px 40px;
    }
    
    header img {
        margin-right: 15px;
        margin-bottom: 0;
    }
    
    .logo {
        margin-bottom: 0;
    }
    
    nav {
        margin-left: 40px;
    }
    
    .content {
        padding: 80px 20px;
    }
}
</style>

</head>

<body>

<header>
    <img src="logo.png" alt="Logo">
    <div class="logo">Soniacore</div>
    <nav>
        <a href="index.html">Головна</a>
        <a href="game.html">Гра</a>
        <a href="about.html">Про нас</a>
    </nav>
</header>

<div class="content">
    <h1>Про компанію</h1>

    <p>
        Soniacore — це ігрова студія, яка створює цікаві та веселі ігри.
    </p>

    <p>В нашій команді працюють:</p>
    
    <div class="team-list">
        <strong>Denchik_gamer, Mr_svin, Кто я?, Саня чітер</strong>
    </div>

    <p style="margin-top: 30px; color: #66c0f4; font-weight: bold;">
        Хорошої гри!
    </p>
</div>

</body>
</html>
